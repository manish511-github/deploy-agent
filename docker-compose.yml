# ============================================
# DeployAI Phase 2 — Server-First Docker Compose
# ============================================
# Usage:
#   docker-compose up -d server     # Start the API server
#   docker-compose run --rm cli     # Run interactive CLI
#   docker-compose run --rm cli run "list all servers"
#
# Phase 2 architecture:
#   - server: FastAPI + SSE + Postgres
#   - cli: Typer + Rich that talks to server via HTTP/SSE
#   - mcp: MCP server (unchanged)
#   - postgres, mqtt, redis: Infrastructure
#
# ──────────────────────────────────────────────

version: "3.8"

services:
  # ──────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: deployai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deployai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deployai_password}
      POSTGRES_DB: ${POSTGRES_DB:-deployai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deployai} -d ${POSTGRES_DB:-deployai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: deployai-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: deployai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────
  # DeployAI Server (FastAPI + SSE + Bus)
  # ──────────────────────────────────

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployai-server
    restart: unless-stopped
    # Override the Dockerfile ENTRYPOINT ("deploy-ai") so we can run python directly
    entrypoint: []
    ports:
      - "8000:8000"
    environment:
      SERVER_MODE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-deployai}:${POSTGRES_PASSWORD:-deployai_password}@postgres:5432/${POSTGRES_DB:-deployai}
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-lite}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      AGENT_API_PORT: 8000
    volumes:
      - ./src:/app/src  # Hot reload in dev
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    networks:
      - deployai-network
    command: ["python", "-m", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────
  # DeployAI CLI (interactive chat)
  # ──────────────────────────────────

  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployai-cli
    restart: "no"
    stdin_open: true
    tty: true
    environment:
      SERVER_BASE_URL: http://server:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-deployai}:${POSTGRES_PASSWORD:-deployai_password}@postgres:5432/${POSTGRES_DB:-deployai}
    volumes:
      - ./src:/app/src  # Hot reload in dev
    depends_on:
      server:
        condition: service_healthy
    networks:
      - deployai-network
    command: ["chat"]

  # ──────────────────────────────────
  # MCP Server (Model Context Protocol)
  # ──────────────────────────────────

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployai-mcp
    restart: unless-stopped
    entrypoint: ["deploy-ai-mcp"]
    ports:
      - "8811:8811"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-deployai}:${POSTGRES_PASSWORD:-deployai_password}@postgres:5432/${POSTGRES_DB:-deployai}
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deployai-network
    command: ["run", "--transport", "sse"]

  # ──────────────────────────────────
  # Test Server (for Go agent simulation)
  # ──────────────────────────────────

  test-server:
    build:
      context: .
      dockerfile: Dockerfile.test-server
    container_name: deployai-test-server
    hostname: test-server
    restart: unless-stopped
    # privileged + cgroup settings required for k3s to run inside Docker
    privileged: true
    # cgroup: host  # Removed - not supported in this version
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - k3s_data:/var/lib/rancher
    networks:
      - deployai-network
    depends_on:
      - mqtt
      - server
    profiles: ["test"]  # Only started with --profile test

volumes:
  postgres_data:
  mqtt_data:
  redis_data:
  k3s_data:

networks:
  deployai-network:
    driver: bridge

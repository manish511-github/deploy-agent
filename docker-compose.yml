version: "3.8"

# ============================================
# DeployAI — Full Stack (Agent + Infrastructure)
# ============================================
# Includes PostgreSQL, MQTT, Redis from linux-server-manager
# plus the AI agent. One command to run everything.

services:
  # ──────────────────────────────────
  # Infrastructure (same as linux-server-manager)
  # ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: deployai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lsm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lsm_password}
      POSTGRES_DB: ${POSTGRES_DB:-linux_server_manager}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lsm_user} -d ${POSTGRES_DB:-linux_server_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: deployai-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: deployai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────
  # Test SSH Server (for E2E testing)
  # ──────────────────────────────────

  test-server:
    build:
      context: .
      dockerfile: Dockerfile.test-server
    container_name: deployai-test-server
    hostname: test-server
    restart: unless-stopped
    volumes:
      - ./test_ssh_key.pub:/root/.ssh/authorized_keys:ro
    networks:
      - deployai-network
    healthcheck:
      test: ["CMD-SHELL", "ssh-keygen -l -f /etc/ssh/ssh_host_rsa_key.pub || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────
  # AI Agent
  # ──────────────────────────────────

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployai-agent
    restart: "no"
    stdin_open: true           # Keep stdin open for interactive chat
    tty: true                  # Allocate a TTY
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-lsm_user}:${POSTGRES_PASSWORD:-lsm_password}@postgres:5432/${POSTGRES_DB:-linux_server_manager}
      SSH_KEY_PATH: /root/.ssh/id_ed25519
      SSH_DEFAULT_USER: ${SSH_DEFAULT_USER:-root}
      SSH_TIMEOUT: ${SSH_TIMEOUT:-30}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
    volumes:
      # Mount the dedicated passwordless test SSH key
      - ./test_ssh_key:/root/.ssh/id_ed25519:ro
      - ./test_ssh_key.pub:/root/.ssh/id_ed25519.pub:ro
      # Mount source code for live hot-reloading
      - ./src:/app/src
    entrypoint: ["python", "-m", "src.cli.app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      test-server:
        condition: service_healthy
    networks:
      - deployai-network

volumes:
  postgres_data:
    driver: local
  mqtt_data:
    driver: local
  redis_data:
    driver: local

networks:
  deployai-network:
    driver: bridge
